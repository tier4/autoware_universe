syntax = "proto3";

package splatsim.v1;

// ── Shared sub-messages ──────────────────────────────────────────────

message Timestamp {
  int32 sec = 1;
  uint32 nanosec = 2;
}

message CameraIntrinsics {
  double fx = 1;
  double fy = 2;
  double cx = 3;
  double cy = 4;
  uint32 width = 5;
  uint32 height = 6;
}

message Vector3 {
  double x = 1;
  double y = 2;
  double z = 3;
}

message Quaternion {
  // wxyz convention (matching gsplat / splatsim convention).
  double w = 1;
  double x = 2;
  double y = 3;
  double z = 4;
}

message Pose {
  Vector3 position = 1;
  Quaternion rotation = 2;
}

// ── Initialization ───────────────────────────────────────────────────

message InitializeRequest {
  // Scene
  string tileset_path = 1;
  bool use_sh = 2;

  // Camera
  CameraIntrinsics intrinsics = 3;
  Pose initial_pose = 4;

  // Rendering schedule
  double frame_rate = 5;          // Hz (e.g. 30.0)
  Timestamp clock_initial = 6;    // starting time for frame scheduling

  // DDS publishing
  string image_topic = 7;
  string camera_info_topic = 8;
  string frame_id = 9;

  // Renderer settings
  float near_plane = 10;
  float far_plane = 11;
  string device = 12;             // "cuda" or "cuda:0" etc.
  Vector3 background_color = 13;  // RGB [0, 1]
}

message InitializeResponse {
  bool success = 1;
  string message = 2;
  Vector3 scene_origin = 3;  // ECEF centroid subtracted for numerical stability
}

// ── Camera data streaming ────────────────────────────────────────────

message CameraData {
  Timestamp stamp = 1;
  Pose pose = 2;
}

message StreamSummary {
  uint64 frames_rendered = 1;
  uint64 poses_received = 2;
}

// ── Service definition ───────────────────────────────────────────────

service RenderingService {
  // Load scene, create renderer and publishers. Blocks until ready.
  rpc Initialize(InitializeRequest) returns (InitializeResponse);

  // Client streams timestamped camera poses. Server renders at frame_rate
  // cadence and publishes via DDS. Returns summary when stream closes.
  rpc StreamCameraData(stream CameraData) returns (StreamSummary);
}
