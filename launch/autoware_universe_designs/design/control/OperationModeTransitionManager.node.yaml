autoware_system_design_format: v0.1.0

name: OperationModeTransitionManager.node
launch:
  package: autoware_operation_mode_transition_manager
  plugin: autoware::operation_mode_transition_manager::OperationModeTransitionManager
  executable: operation_mode_transition_manager_node
  use_container: true
  container_name: control_container
inputs:
  - name: kinematics
    message_type: nav_msgs/msg/Odometry
  - name: steering
    message_type: autoware_vehicle_msgs/msg/SteeringReport
  - name: trajectory
    message_type: autoware_planning_msgs/msg/Trajectory
  - name: control_cmd
    message_type: autoware_control_msgs/msg/Control
  - name: trajectory_follower_control_cmd
    message_type: autoware_control_msgs/msg/Control
  - name: control_mode_report
    message_type: autoware_vehicle_msgs/msg/ControlModeReport
  - name: gate_operation_mode
    message_type: autoware_adapi_v1_msgs/msg/OperationModeState
outputs:
  - name: is_autonomous_available
    message_type: std_msgs/msg/Bool
  - name: control_mode_request
    message_type: autoware_vehicle_msgs/msg/ControlModeCommand
parameter_files:
  - name: operation_mode_transition_manager_param
    default: $(find-pkg-share autoware_operation_mode_transition_manager)/config/operation_mode_transition_manager.param.yaml
parameters: []
processes:
  - name: manage_transition
    trigger_conditions:
      - periodic: 10.0
    outcomes:
      - to_output: control_mode_request
