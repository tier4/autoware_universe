autoware_system_design_format: v0.1.0

name: CollisionDetector.node
launch:
  package: autoware_collision_detector
  plugin: autoware::collision_detector::CollisionDetectorNode
  executable: collision_detector_node
  use_container: true
  container_name: control_check_container
inputs:
  - name: odometry
    message_type: nav_msgs/msg/Odometry
  - name: pointcloud
    message_type: sensor_msgs/msg/PointCloud2
  - name: objects
    message_type: autoware_perception_msgs/msg/PredictedObjects
outputs:
  - name: collision_status
    message_type: std_msgs/msg/Bool
parameter_files:
  - name: collision_detector_param
    default: $(find-pkg-share autoware_collision_detector)/config/collision_detector.param.yaml
parameters: []
processes:
  - name: detect_collision
    trigger_conditions:
      - on_input: pointcloud
    outcomes:
      - to_output: collision_status
