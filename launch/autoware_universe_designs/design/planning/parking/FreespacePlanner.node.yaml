autoware_system_design_format: v0.1.0

name: FreespacePlanner.node
launch:
  package: autoware_freespace_planner
  plugin: autoware::freespace_planner::FreespacePlannerNode
  executable: freespace_planner_node
  use_container: true
  container_name: parking_container
inputs:
  - name: route
    message_type: autoware_planning_msgs/msg/LaneletRoute
  - name: scenario
    message_type: tier4_planning_msgs/msg/Scenario
  - name: occupancy_grid
    message_type: nav_msgs/msg/OccupancyGrid
  - name: odometry
    message_type: nav_msgs/msg/Odometry
outputs:
  - name: trajectory
    message_type: autoware_planning_msgs/msg/Trajectory
  - name: is_completed
    message_type: std_msgs/msg/Bool
parameter_files:
  - name: freespace_planner_param
    default: $(find-pkg-share autoware_freespace_planner)/config/freespace_planner.param.yaml
  - name: vehicle_param
    default: $(find-pkg-share autoware_vehicle_info_utils)/config/vehicle_info.param.yaml
parameters: []
processes:
  - name: plan_freespace
    trigger_conditions:
      - on_input: occupancy_grid
      - on_input: odometry
    outcomes:
      - to_output: trajectory
