autoware_system_design_format: v0.1.0

name: PathOptimizer.node
launch:
  package: autoware_path_optimizer
  plugin: autoware::path_optimizer::PathOptimizer
  executable: path_optimizer_node
  use_container: true
  container_name: motion_planning_container
inputs:
  - name: path
    message_type: autoware_planning_msgs/msg/Path
  - name: odometry
    message_type: nav_msgs/msg/Odometry
outputs:
  - name: trajectory
    message_type: autoware_planning_msgs/msg/Trajectory
parameter_files:
  - name: path_optimizer_param
    default: $(find-pkg-share autoware_path_optimizer)/config/path_optimizer.param.yaml
  - name: vehicle_param
    default: $(find-pkg-share autoware_vehicle_info_utils)/config/vehicle_info.param.yaml
parameters: []
processes:
  - name: optimize_path
    trigger_conditions:
      - on_input: path
    outcomes:
      - to_output: trajectory
