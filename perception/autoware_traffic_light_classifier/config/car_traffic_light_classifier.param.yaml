/**:
  ros__parameters:
    approximate_sync: false
    precision: fp16
    mean: [123.675, 116.28, 103.53]
    std: [58.395, 57.12, 57.375]
    over_exposure_threshold: 0.85
    under_exposure_threshold: -0.83
    roi_expand_pixels: 0   # Expand ROI by this many pixels on each side (0 = no expand)
    backlight_threshold: 0.85
    # classifier_type set in launch file (unified with artifact paths)
    traffic_light_type: 0
    # LampRecognizer (classifier_type: 2) optional parameters
    score_threshold: 0.2
    nms_threshold: 0.2  # IoU threshold for NMS; lower = merge more overlapping same-class boxes (e.g. arrows)
    max_batch_size: 64
    input_height: 256   # LampRecognizer input H (fallback if ONNX dims dynamic)
    input_width: 256    # LampRecognizer input W (fallback if ONNX dims dynamic)
