/**:
  ros__parameters:
    # Euclidean clustering
    use_height: false
    tolerance: 0.7
    min_cluster_size: 10
    max_cluster_size: 3000

    # Point filtering by semantic confidence
    min_probability: 0.3

    # Semantic label selection and mapping
    # YAML declaration order is treated as the input class_id order.
    class_names:
      drivable_surface: ignore
      other_flat_surface: ignore
      sidewalk: ignore
      manmade: ignore
      vegetation: ignore
      car: car
      bus: bus
      emergency_vehicle: ignore
      train: ignore
      truck: truck
      tractor_unit: ignore
      semi_trailer: ignore
      construction_vehicle: ignore
      forklift: ignore
      kart: ignore
      motorcycle: motorcycle
      bicycle: bicycle
      pedestrian: pedestrian
      personal_mobility: ignore
      animal: ignore
      pushable_pullable: ignore
      traffic_cone: ignore
      debris: ignore
      stroller: ignore
      other_stuff: ignore
      noise+ghost_point: ignore

    # Shape estimation behavior
    use_shape_estimation_corrector: false
    use_shape_estimation_filter: false
    use_boost_bbox_optimizer: false
