autoware_system_design_format: 0.3.0

# node information
name: BehaviorPathPlanner.node

package:
  name: autoware_behavior_path_planner
  provider: autoware

launch:
  plugin: autoware::behavior_path_planner::BehaviorPathPlannerNode
  executable: behavior_path_planner_node

# interfaces
subscribers:
  - name: route
    message_type: autoware_planning_msgs/msg/LaneletRoute
  - name: vector_map
    message_type: autoware_map_msgs/msg/LaneletMapBin
  - name: perception
    message_type: autoware_perception_msgs/msg/PredictedObjects
  - name: occupancy_grid_map
    message_type: nav_msgs/msg/OccupancyGrid
  - name: costmap
    message_type: nav_msgs/msg/OccupancyGrid
  - name: traffic_signals
    message_type: autoware_perception_msgs/msg/TrafficLightGroupArray
  - name: odometry
    message_type: nav_msgs/msg/Odometry
  - name: accel
    message_type: geometry_msgs/msg/AccelWithCovarianceStamped
  - name: scenario
    message_type: autoware_internal_planning_msgs/msg/Scenario

publishers:
  - name: path
    message_type: autoware_internal_planning_msgs/msg/PathWithLaneId
  - name: turn_indicators_cmd
    message_type: autoware_vehicle_msgs/msg/TurnIndicatorsCommand
  - name: hazard_lights_cmd
    message_type: autoware_vehicle_msgs/msg/HazardLightsCommand
  - name: modified_goal
    message_type: geometry_msgs/msg/PoseWithUuidStamped
  - name: is_reroute_available
    message_type: tier4_planning_msgs/msg/RerouteAvailability

# parameters
param_files:
  - name: behavior_path_planner_param
    default: $(find-pkg-share autoware_behavior_path_planner)/config/behavior_path_planner.param.yaml
  - name: lane_change_param
    default: $(find-pkg-share autoware_behavior_path_planner)/config/lane_change.param.yaml
  - name: goal_planner_param
    default: $(find-pkg-share autoware_behavior_path_planner)/config/goal_planner.param.yaml
  - name: avoidance_param
    default: $(find-pkg-share autoware_behavior_path_planner)/config/avoidance.param.yaml

param_values:
  - name: launch_modules
    type: string_array
    default:
      - autoware::behavior_path_planner::LaneChangeRightModuleManager
      - autoware::behavior_path_planner::LaneChangeLeftModuleManager
      - autoware::behavior_path_planner::StaticObstacleAvoidanceModuleManager
      - autoware::behavior_path_planner::GoalPlannerModuleManager

# processes
processes:
  - name: plan_path
    trigger_conditions:
      - on_input: route
      - on_input: odometry
    outcomes:
      - to_output: path
