autoware_system_design_format: v0.1.0

name: HazardLightsSelector.node
launch:
  package: autoware_hazard_lights_selector
  plugin: autoware::hazard_lights_selector::HazardLightsSelectorNode
  executable: autoware_hazard_lights_selector_node
  use_container: false
inputs:
  - name: lane_driving_hazard_lights_cmd
    message_type: autoware_vehicle_msgs/msg/HazardLightsCommand
  - name: parking_hazard_lights_cmd
    message_type: autoware_vehicle_msgs/msg/HazardLightsCommand
outputs:
  - name: hazard_lights_cmd
    message_type: autoware_vehicle_msgs/msg/HazardLightsCommand
parameter_files: []
parameters: []
processes:
  - name: select_hazard_lights
    trigger_conditions:
      - periodic: 10.0
    outcomes:
      - to_output: hazard_lights_cmd
