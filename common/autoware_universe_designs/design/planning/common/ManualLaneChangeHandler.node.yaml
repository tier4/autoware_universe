autoware_system_design_format: 0.3.0

# node information
name: ManualLaneChangeHandler.node

package:
  name: autoware_manual_lane_change_handler
  provider: autoware

launch:
  plugin: autoware::manual_lane_change_handler::ManualLaneChangeHandler
  executable: autoware_manual_lane_change_handler_node

# interfaces
subscribers:
  - name: route
    message_type: autoware_planning_msgs/msg/LaneletRoute
    remap_target: /planning/mission_planning/route
  - name: odometry
    message_type: nav_msgs/msg/Odometry

publishers: []

# parameters
param_files:
  - name: manual_lane_change_handler_param
    default: config/manual_lane_change_handler.param.yaml

param_values: []

# processes
processes:
  - name: handle_request
    trigger_conditions:
      - periodic: 10.0
    outcomes:
      - terminal: null
