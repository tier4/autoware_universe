validator:
  filter_names:
    type: string_array
    default_value: []
    description: metrics.
    read_only: false

  out_of_lane:
    time:
      type: double
      default_value: 3.0
      description: The time range to check
      read_only: false
    min_value:
      type: double
      default_value: 0.0
      description: Minimum distance to lane boundary
      read_only: false

  collision:
    time:
      type: double
      default_value: 3.0
      description: The time range to check
      read_only: false
    min_value:
      type: double
      default_value: 2.0
      description: Minimum acceptable time to collision
      read_only: false

  vehicle_constraint:
    max_speed:
      type: double
      default_value: 16.7
      description: Maximum allowed speed (m/s)
      read_only: false
    max_acceleration:
      type: double
      default_value: 5.0
      description: Maximum allowed acceleration (m/s^2)
      read_only: false
    max_deceleration:
      type: double
      default_value: 5.0
      description: Maximum allowed deceleration (m/s^2, positive but represents deceleration)
      read_only: false
    max_steering_angle:
      type: double
      default_value: 0.8
      description: Maximum allowed steering angle (rad)
      read_only: false
    max_steering_rate:
      type: double
      default_value: 0.3
      description: Maximum allowed steering rate (rad/s)
      read_only: false

  collision_check:
    pet_collision:
      ego_braking_delay:
        type: double
        default_value: 0.4
        description: N/A
        read_only: false
      ego_assumed_acceleration:
        base: &pet_eaa { type: double, default_value: -4.0, description: N/A, read_only: false }
        UNKNOWN: *pet_eaa
        CAR: *pet_eaa
        TRUCK: *pet_eaa
        BUS: *pet_eaa
        TRAILER: *pet_eaa
        MOTORCYCLE: *pet_eaa
        BICYCLE: *pet_eaa
        PEDESTRIAN: *pet_eaa
        ANIMAL: *pet_eaa
        HAZARD: *pet_eaa
        OVER_DRIVABLE: *pet_eaa
        UNDER_DRIVABLE: *pet_eaa
      collision_time_threshold:
        base: &pet_ctt { type: double, default_value: 1.0, description: N/A, read_only: false }
        UNKNOWN: *pet_ctt
        CAR: *pet_ctt
        TRUCK: *pet_ctt
        BUS: *pet_ctt
        TRAILER: *pet_ctt
        MOTORCYCLE: *pet_ctt
        BICYCLE: *pet_ctt
        PEDESTRIAN: *pet_ctt
        ANIMAL: *pet_ctt
        HAZARD: *pet_ctt
        OVER_DRIVABLE: *pet_ctt
        UNDER_DRIVABLE: *pet_ctt
    rss:
      ego_deceleration_threshold:
        base: &rss_edt { type: double, default_value: 4.0, description: N/A, read_only: false }
        UNKNOWN: *rss_edt
        CAR: *rss_edt
        TRUCK: *rss_edt
        BUS: *rss_edt
        TRAILER: *rss_edt
        MOTORCYCLE: *rss_edt
        BICYCLE: *rss_edt
        PEDESTRIAN: *rss_edt
        ANIMAL: *rss_edt
        HAZARD: *rss_edt
        OVER_DRIVABLE: *rss_edt
        UNDER_DRIVABLE: *rss_edt
      ego_reaction_time:
        base: &rss_ert { type: double, default_value: 0.4, description: N/A, read_only: false }
        UNKNOWN: *rss_ert
        CAR: *rss_ert
        TRUCK: *rss_ert
        BUS: *rss_ert
        TRAILER: *rss_ert
        MOTORCYCLE: *rss_ert
        BICYCLE: *rss_ert
        PEDESTRIAN: *rss_ert
        ANIMAL: *rss_ert
        HAZARD: *rss_ert
        OVER_DRIVABLE: *rss_ert
        UNDER_DRIVABLE: *rss_ert
      object_acceleration:
        base: &rss_oa { type: double, default_value: -1.0, description: N/A, read_only: false }
        CAR: *rss_oa
        TRUCK: *rss_oa
        BUS: *rss_oa
        TRAILER: *rss_oa
        MOTORCYCLE: *rss_oa
        BICYCLE: *rss_oa
        PEDESTRIAN: *rss_oa
        ANIMAL: *rss_oa
        HAZARD: *rss_oa
        OVER_DRIVABLE: *rss_oa
        UNDER_DRIVABLE: *rss_oa

  traffic_light:
    deceleration_limit:
      type: double
      default_value: 2.8
      description: Trajectories crossing an amber light are rejected if ego can stop at the stop line without breaking this limit (m/s^2)
      read_only: false
    jerk_limit:
      type: double
      default_value: 5.0
      description: Trajectories crossing an amber light are rejected if ego can stop at the stop line without breaking this limit (m/s^3)
      read_only: false
    delay_response_time:
      type: double
      default_value: 0.5
      description: Delay response time used to estimate the minimum ego stopping distance (s)
      read_only: false
    crossing_time_limit:
      type: double
      default_value: 2.75
      description: Trajectories crossing an amber light are rejected if they cannot cross before this time (s)
      read_only: false
    treat_amber_light_as_red_light:
      type: bool
      default_value: false
      description: When true, amber lights are handled like red lights
      read_only: false
    stop_overshoot_margin:
      type: double
      default_value: 0.5
      description: Maximum distance between the stop line and the trajectory stop point to consider the trajectory feasible (m)
      read_only: false
    checked_trajectory_length:
      deceleration_limit:
        type: double
        default_value: 2.0
        description: deceleration limit to calculate the stop distance used as trajectory length limit
        read_only: false
      jerk_limit:
        type: double
        default_value: 4.0
        description: jerk limit to calculate the stop distance used as trajectory length limit
        read_only: false

  boundary_departure:
    lateral_gap_to_boundary_m:
      type: double
      default_value: 0.01
      description: N/A
      read_only: false
    longitudinal_gap_to_boundary_m:
      type: double
      default_value: 1.0
      description: N/A
      read_only: false
    max_deceleration_mps2:
      type: double
      default_value: -4.0
      description: N/A
      read_only: false
    max_jerk_mps3:
      type: double
      default_value: -5.0
      description: N/A
      read_only: false
    brake_delay_s:
      type: double
      default_value: 1.0
      description: N/A
      read_only: false
    cutoff_time_s:
      type: double
      default_value: 2.0
      description: N/A
      read_only: false
