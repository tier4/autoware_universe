validator:
  filter_names:
    type: string_array
    default_value: []
    description: metrics.
    read_only: false

  out_of_lane:
    time:
      type: double
      default_value: 3.0
      description: The time range to check
      read_only: false
    min_value:
      type: double
      default_value: 0.0
      description: Minimum distance to lane boundary
      read_only: false

  collision:
    time:
      type: double
      default_value: 3.0
      description: The time range to check
      read_only: false
    min_value:
      type: double
      default_value: 2.0
      description: Minimum acceptable time to collision
      read_only: false

  vehicle_constraint:
    max_speed:
      type: double
      default_value: 16.7
      description: Maximum allowed speed (m/s)
      read_only: false
    max_acceleration:
      type: double
      default_value: 5.0
      description: Maximum allowed acceleration (m/s^2)
      read_only: false
    max_deceleration:
      type: double
      default_value: 5.0
      description: Maximum allowed deceleration (m/s^2, positive but represents deceleration)
      read_only: false
    max_steering_angle:
      type: double
      default_value: 0.8
      description: Maximum allowed steering angle (rad)
      read_only: false
    max_steering_rate:
      type: double
      default_value: 0.3
      description: Maximum allowed steering rate (rad/s)
      read_only: false

  collision_check:
    pet_collision:
      ego_braking_delay:
        type: double
        default_value: 0.4
        description: N/A
        read_only: false
      ego_assumed_acceleration:
        base:
          type: double
          default_value: -4.0
          description: N/A
          read_only: false
        unknown: &pet_eaa { type: double, default_value: .NAN, description: N/A, read_only: false }
        car: *pet_eaa
        truck: *pet_eaa
        bus: *pet_eaa
        trailer: *pet_eaa
        motorcycle: *pet_eaa
        bicycle: *pet_eaa
        pedestrian: *pet_eaa
        animal: *pet_eaa
        hazard: *pet_eaa
        over_drivable: *pet_eaa
        under_drivable: *pet_eaa
      collision_time_threshold:
        base:
          type: double
          default_value: 1.0
          description: N/A
          read_only: false
        unknown: &pet_ctt { type: double, default_value: .NAN, description: N/A, read_only: false }
        car: *pet_ctt
        truck: *pet_ctt
        bus: *pet_ctt
        trailer: *pet_ctt
        motorcycle: *pet_ctt
        bicycle: *pet_ctt
        pedestrian: *pet_ctt
        animal: *pet_ctt
        hazard: *pet_ctt
        over_drivable: *pet_ctt
        under_drivable: *pet_ctt
    rss:
      ego_deceleration_threshold:
        base:
          type: double
          default_value: 4.0
          description: N/A
          read_only: false
        unknown:  &rss_edt { type: double, default_value: .NAN, description: N/A, read_only: false }
        car: *rss_edt
        truck: *rss_edt
        bus: *rss_edt
        trailer: *rss_edt
        motorcycle: *rss_edt
        bicycle: *rss_edt
        pedestrian: *rss_edt
        animal: *rss_edt
        hazard: *rss_edt
        over_drivable: *rss_edt
        under_drivable: *rss_edt
      stop_margin:
        type: double
        default_value: 2.0
        description: required remaining distance to the object when ego stops
        read_only: false
      ego_reaction_time:
        base:
          type: double
          default_value: 0.4
          description: N/A
          read_only: false
        unknown: &rss_ert { type: double, default_value: .NAN, description: N/A, read_only: false }
        car: *rss_ert
        truck: *rss_ert
        bus: *rss_ert
        trailer: *rss_ert
        motorcycle: *rss_ert
        bicycle: *rss_ert
        pedestrian: *rss_ert
        animal: *rss_ert
        hazard: *rss_ert
        over_drivable: *rss_ert
        under_drivable: *rss_ert
      object_acceleration:
        base:
          type: double
          default_value: -1.0
          description: N/A
          read_only: false
        unknown:  &rss_oa { type: double, default_value: .NAN, description: N/A, read_only: false }
        car: *rss_oa
        truck: *rss_oa
        bus: *rss_oa
        trailer: *rss_oa
        motorcycle: *rss_oa
        bicycle: *rss_oa
        pedestrian: *rss_oa
        animal: *rss_oa
        hazard: *rss_oa
        over_drivable: *rss_oa
        under_drivable: *rss_oa

  traffic_light:
    deceleration_limit:
      type: double
      default_value: 2.8
      description: Trajectories crossing an amber light are rejected if ego can stop at the stop line without breaking this limit (m/s^2)
      read_only: false
    jerk_limit:
      type: double
      default_value: 5.0
      description: Trajectories crossing an amber light are rejected if ego can stop at the stop line without breaking this limit (m/s^3)
      read_only: false
    delay_response_time:
      type: double
      default_value: 0.5
      description: Delay response time used to estimate the minimum ego stopping distance (s)
      read_only: false
    crossing_time_limit:
      type: double
      default_value: 2.75
      description: Trajectories crossing an amber light are rejected if they cannot cross before this time (s)
      read_only: false
    treat_amber_light_as_red_light:
      type: bool
      default_value: false
      description: When true, amber lights are handled like red lights
      read_only: false
    stop_overshoot_margin:
      type: double
      default_value: 0.5
      description: Maximum distance between the stop line and the trajectory stop point to consider the trajectory feasible (m)
      read_only: false
    checked_trajectory_length:
      deceleration_limit:
        type: double
        default_value: 2.0
        description: deceleration limit to calculate the stop distance used as trajectory length limit
        read_only: false
      jerk_limit:
        type: double
        default_value: 4.0
        description: jerk limit to calculate the stop distance used as trajectory length limit
        read_only: false

  boundary_departure:
    lateral_gap_to_boundary_m:
      type: double
      default_value: 0.01
      description: N/A
      read_only: false
    longitudinal_gap_to_boundary_m:
      type: double
      default_value: 1.0
      description: N/A
      read_only: false
    max_deceleration_mps2:
      type: double
      default_value: -4.0
      description: N/A
      read_only: false
    max_jerk_mps3:
      type: double
      default_value: -5.0
      description: N/A
      read_only: false
    brake_delay_s:
      type: double
      default_value: 1.0
      description: N/A
      read_only: false
    cutoff_time_s:
      type: double
      default_value: 2.0
      description: N/A
      read_only: false
  pseudo_emergency_stop:
    enable:
      type: bool
      default_value: false
      description: When true, the emergency-stop fallback is active. When false, all emergency-stop handling is skipped. Evaluation use only.
      read_only: false
    deceleration_mps2:
      type: double
      default_value: -6.0
      description: Target longitudinal deceleration (m/s^2, negative) used to build the emergency-stop velocity profile. Evaluation use only.
      read_only: false
    jerk_mps3:
      type: double
      default_value: -20.0
      description: Longitudinal jerk (m/s^3, negative) used to ramp the deceleration when building the emergency-stop velocity profile. Evaluation use only.
      read_only: false
    recovery_policy:
      type: string
      default_value: until_stopped
      description: Recovery policy after the emergency-stop is triggered. until_stopped keeps decelerating until the ego velocity falls below recovery_velocity_threshold_mps. immediate releases the deceleration as soon as the trigger condition disappears. Evaluation use only.
      read_only: false
    recovery_velocity_threshold_mps:
      type: double
      default_value: 0.1
      description: Ego velocity threshold (m/s) under which the latched emergency-stop state is released when recovery_policy is until_stopped. Evaluation use only.
      read_only: false
